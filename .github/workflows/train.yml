name: Train Carcassonne AI

on:
  workflow_dispatch:
    inputs:
      time_budget_minutes:
        description: "Training time budget in minutes"
        required: false
        default: "105"
      population:
        description: "Population size"
        required: false
        default: "24"

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: carcassonne-ai-training
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: AI Trainer
        run: npm ci

      - name: Smoke test
        working-directory: AI Trainer
        run: npm run smoke

      - name: Train
        working-directory: AI Trainer
        run: |
          node src/evolve.js \
            --seed "${{ github.run_id }}" \
            --time-budget-minutes "${{ github.event.inputs.time_budget_minutes || '105' }}" \
            --population "${{ github.event.inputs.population || '24' }}" \
            --elite 6 \
            --min-games-per-candidate 20 \
            --max-games-per-candidate 500 \
            --mutation-rate 0.25 \
            --mutation-scale 0.12

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carcassonne-ai-results-${{ github.run_number }}
          path: AI Trainer/results/

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "AI Trainer/results/"
          git commit -m "chore: update trained Carcassonne AI weights (run ${{ github.run_number }})" || echo "No changes to commit"
          git push
