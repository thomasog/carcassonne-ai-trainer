name: Train Carcassonne AI

on:
  workflow_dispatch:
    inputs:
      time_budget_minutes:
        description: "Training time budget in minutes"
        required: false
        default: "110"
      population:
        description: "Population size"
        required: false
        default: "24"
      run_smoke:
        description: "Run smoke tests before training?"
        required: false
        default: "false"

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: carcassonne-ai-training
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: "AI Trainer"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        if: github.event.inputs.run_smoke == 'true'
        run: node src/smoke.js

      - name: Train
        run: |
          node src/evolve.js \
            --seed "${{ github.run_id }}" \
            --time-budget-minutes "${{ github.event.inputs.time_budget_minutes || '110' }}" \
            --shutdown-grace-seconds 240 \
            --population "${{ github.event.inputs.population || '24' }}" \
            --elite 6 \
            --min-games-per-candidate 20 \
            --max-games-per-candidate 500 \
            --duel-chunk-size 1 \
            --max-candidate-minutes 10 \
            --max-chunk-seconds 60 \
            --mutation-rate 0.25 \
            --mutation-scale 0.12 \
            --min-improvement 0.01 \
            --min-games-to-promote 100

      - name: Ensure results directory exists
        if: always()
        run: mkdir -p results

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carcassonne-ai-results-${{ github.run_number }}
          path: AI Trainer/results/
          if-no-files-found: warn

      - name: Commit results
        if: always()
        working-directory: "."
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add "AI Trainer/results/" || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update trained Carcassonne AI weights (run ${{ github.run_number }})"
            git push
          fi
