name: Validate Carcassonne AI Trainer

on:
  push:
    paths:
      - "AI Trainer/src/**"
      - "AI Trainer/package.json"
      - ".github/workflows/**"

  pull_request:
    paths:
      - "AI Trainer/src/**"
      - "AI Trainer/package.json"
      - ".github/workflows/**"

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "AI Trainer"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: node src/smoke.js
