name: Validate Carcassonne AI Trainer

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "package.json"
      - ".github/workflows/**"

  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "package.json"
      - ".github/workflows/**"

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: node src/smoke.js
